<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Music App</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body class="page-tracks">
<header>
    <a th:href="@{/ui/artists}"><h1>Music App</h1></a>
    <h2 th:text="${title}"></h2>
</header>
<nav>
    <a th:href="@{/ui/artists}">Artists</a>
    <a th:href="@{/ui/tracks}">Tracks</a>
    <a th:href="@{/ui/playlists}">Playlists</a>
</nav>
<section>
    <table>
        <tr>
            <th>Title</th>
            <th>Artist</th>
            <th>Playlists</th>
        </tr>
        <tr th:each="t : ${tracks}">
            <td th:text="${t.title}"></td>
            <td>
                <a th:href="@{/ui/tracks?artistId={id}(id=${t.artist.id})}"
                   th:text="${t.artist.firstName} + ' ' + ${t.artist.lastName}"></a>
            </td>
            <td class="search-container">
                <a class="search" th:href="@{/ui/playlists(trackId=${t.id})}"></a>


            </td>
        </tr>
    </table>
</section>
<footer>
</footer>
</body>
</html>
