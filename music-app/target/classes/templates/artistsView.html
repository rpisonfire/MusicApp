<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Music App</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body class="page-artists">
<header>
    <a th:href="@{/ui/artists}"><h1>Music App</h1></a>
    <h2 th:text="${title}"></h2>
</header>
<nav>
    <a th:href="@{/ui/artists}">Artists</a>
    <a th:href="@{/ui/tracks}">Tracks</a>
    <a th:href="@{/ui/playlists}">Playlists</a>
</nav>
<section>
    <table>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Tracks</th>
        </tr>
        <tr th:each="a : ${artists}">
            <td th:text="${a.firstName}"></td>
            <td th:text="${a.lastName}"></td>
            <td class="search-container">
                <a class="search" th:href="@{/ui/tracks(artistId=${a.id})}"></a>
            </td>
        </tr>
    </table>
</section>
<footer>
</footer>
</body>
</html>
